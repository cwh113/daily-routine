<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Routine">
<meta name="theme-color" content="#f5f0e8">
<title>Daily Routine</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Inconsolata:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --paper: #f5f0e8;
  --paper2: #ede8df;
  --paper3: #e4ddd1;
  --ink: #1a1714;
  --ink2: #3d3830;
  --ink3: #6b6358;
  --ink4: #a09890;
  --rule: #d8d0c4;
  --rule2: #c8bfb4;
  --morning: #5c4a2a;
  --midday: #2a4a3a;
  --evening: #2a3a5c;
  --check: #2a4a3a;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Inconsolata', monospace;
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

.view { display: none; flex-direction: column; min-height: 100vh; }
.view.active { display: flex; }

/* NAV */
.nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--paper);
  border-top: 1px solid var(--rule2);
  display: flex;
  padding-bottom: var(--safe-bottom);
  z-index: 100;
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 12px 0; background: none; border: none; color: var(--ink4);
  font-family: 'Inconsolata', monospace; font-size: 10px;
  letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; transition: color 0.2s;
}
.nav-btn.active { color: var(--ink); }
.nav-icon { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

/* HEADER */
.header {
  padding: calc(var(--safe-top) + 28px) 24px 20px;
  border-bottom: 1px solid var(--rule2);
  background: var(--paper);
  position: sticky; top: 0; z-index: 50;
}
.header-eyebrow { font-family: 'Inconsolata', monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink4); margin-bottom: 6px; }
.header-title { font-family: 'Lora', serif; font-size: 26px; font-weight: 400; color: var(--ink); letter-spacing: -0.01em; }
.progress-row { display: flex; align-items: center; gap: 12px; margin-top: 14px; }
.progress-bar-wrap { flex: 1; height: 1px; background: var(--rule); position: relative; }
.progress-bar-fill { position: absolute; top: 0; left: 0; bottom: 0; background: var(--ink2); transition: width 0.4s ease; }
.progress-label { font-size: 11px; color: var(--ink3); letter-spacing: 0.06em; flex-shrink: 0; }

/* SCROLL */
.scroll-content { flex: 1; overflow-y: auto; padding: 0 0 calc(72px + var(--safe-bottom)); -webkit-overflow-scrolling: touch; }

/* SECTION */
.section-head { display: flex; align-items: baseline; gap: 10px; padding: 28px 24px 10px; }
.section-name { font-family: 'Lora', serif; font-size: 13px; font-style: italic; font-weight: 400; }
.section-name.morning { color: var(--morning); }
.section-name.midday  { color: var(--midday); }
.section-name.evening { color: var(--evening); }
.section-time { font-size: 10px; color: var(--ink4); letter-spacing: 0.06em; }
.section-rule { height: 1px; background: var(--rule); margin: 0 24px; }

/* HABIT */
.habit {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 14px 24px; border-bottom: 1px solid var(--rule);
  cursor: pointer; transition: background 0.12s;
  -webkit-user-select: none; user-select: none;
}
.habit:active { background: var(--paper2); }
.habit.done   { background: var(--paper2); }

.check-box {
  width: 18px; height: 18px; border: 1px solid var(--rule2); border-radius: 2px;
  flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center;
  transition: all 0.18s ease; background: transparent;
}
.habit.done .check-box { background: var(--check); border-color: var(--check); }

.check-icon { opacity: 0; transform: scale(0.6); transition: all 0.2s cubic-bezier(0.34,1.4,0.64,1); }
.habit.done .check-icon { opacity: 1; transform: scale(1); }

.habit-body { flex: 1; min-width: 0; }
.habit-title { font-family: 'Lora', serif; font-size: 15px; font-weight: 400; color: var(--ink); line-height: 1.35; transition: color 0.18s; }
.habit.done .habit-title { color: var(--ink4); text-decoration: line-through; text-decoration-color: var(--ink4); text-decoration-thickness: 1px; }
.habit-sub { font-family: 'Inconsolata', monospace; font-size: 11px; color: var(--ink3); margin-top: 3px; line-height: 1.5; transition: opacity 0.18s; }
.habit.done .habit-sub { opacity: 0.5; }
.habit-note { font-family: 'Lora', serif; font-size: 11px; font-style: italic; color: var(--ink4); margin-top: 4px; }
.new-mark { font-family: 'Inconsolata', monospace; font-size: 9px; color: var(--ink4); letter-spacing: 0.1em; margin-left: 6px; vertical-align: middle; text-transform: uppercase; border: 1px solid var(--rule2); padding: 1px 4px; border-radius: 2px; }

/* COMPLETE */
.complete-msg { text-align: center; padding: 32px 24px; display: none; border-top: 1px solid var(--rule); margin-top: 8px; }
.complete-msg.show { display: block; }
.complete-title { font-family: 'Lora', serif; font-size: 18px; font-style: italic; color: var(--ink2); margin-bottom: 6px; }
.complete-sub { font-family: 'Inconsolata', monospace; font-size: 11px; color: var(--ink4); letter-spacing: 0.06em; text-transform: uppercase; }

/* RESET */
.reset-row { display: flex; justify-content: flex-end; padding: 16px 24px 0; }
.reset-btn { font-family: 'Inconsolata', monospace; font-size: 10px; color: var(--ink4); background: none; border: 1px solid var(--rule); padding: 5px 10px; border-radius: 2px; cursor: pointer; letter-spacing: 0.1em; text-transform: uppercase; transition: all 0.15s; }
.reset-btn:active { border-color: var(--rule2); color: var(--ink3); }

/* TRENDS HEADER */
.trends-header { padding: calc(var(--safe-top) + 28px) 24px 20px; border-bottom: 1px solid var(--rule2); background: var(--paper); position: sticky; top: 0; z-index: 50; }
.trends-eyebrow { font-family: 'Inconsolata', monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink4); margin-bottom: 6px; }
.trends-title { font-family: 'Lora', serif; font-size: 26px; font-weight: 400; color: var(--ink); }
.trends-scroll { flex: 1; overflow-y: auto; padding: 0 0 calc(72px + var(--safe-bottom)); -webkit-overflow-scrolling: touch; }

/* PERIOD TABS */
.period-tabs { display: flex; padding: 20px 24px 0; border-bottom: 1px solid var(--rule); }
.period-tab { font-family: 'Inconsolata', monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; padding: 8px 16px; border: none; background: none; color: var(--ink4); cursor: pointer; transition: all 0.15s; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.period-tab.active { color: var(--ink); border-bottom-color: var(--ink); }

/* STATS */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; padding: 24px; gap: 1px; background: var(--rule); border-bottom: 1px solid var(--rule); }
.stat-card { background: var(--paper); padding: 16px; }
.stat-val { font-family: 'Lora', serif; font-size: 30px; font-weight: 500; color: var(--ink); line-height: 1; }
.stat-label { font-family: 'Inconsolata', monospace; font-size: 10px; color: var(--ink4); margin-top: 6px; letter-spacing: 0.1em; text-transform: uppercase; }

/* TREND SECTION */
.trend-section { padding: 28px 24px 0; }
.trend-section-title { font-family: 'Lora', serif; font-size: 13px; font-style: italic; color: var(--ink3); margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--rule); }

/* WEEK HEATMAP */
.week-row { display: grid; grid-template-columns: repeat(7,1fr); gap: 6px; }
.week-day { display: flex; flex-direction: column; align-items: center; gap: 5px; }
.week-day-label { font-family: 'Inconsolata', monospace; font-size: 9px; color: var(--ink4); letter-spacing: 0.06em; text-transform: uppercase; }
.week-day-cell { width: 100%; aspect-ratio: 1; border: 1px solid var(--rule); border-radius: 2px; display: flex; align-items: center; justify-content: center; font-family: 'Inconsolata', monospace; font-size: 9px; color: var(--ink4); background: var(--paper); }
.week-day-cell.pct-100 { background: var(--ink2); color: var(--paper); border-color: var(--ink2); }
.week-day-cell.pct-75  { background: var(--ink3); color: var(--paper); border-color: var(--ink3); }
.week-day-cell.pct-50  { background: var(--paper3); color: var(--ink2); border-color: var(--rule2); }
.week-day-cell.pct-25  { background: var(--paper2); color: var(--ink3); border-color: var(--rule); }
.week-day-cell.is-today { border-color: var(--ink2); }
.week-day-cell.future  { opacity: 0.35; }

.legend-row { display: flex; gap: 14px; margin-top: 12px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 5px; font-family: 'Inconsolata', monospace; font-size: 9px; color: var(--ink4); letter-spacing: 0.06em; text-transform: uppercase; }
.legend-swatch { width: 10px; height: 10px; border-radius: 1px; border: 1px solid var(--rule); }

/* CALENDAR */
.cal-header-row { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; margin-bottom: 4px; }
.cal-header-cell { font-family: 'Inconsolata', monospace; font-size: 9px; color: var(--ink4); text-align: center; letter-spacing: 0.06em; text-transform: uppercase; }
.calendar-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
.cal-cell { aspect-ratio: 1; border: 1px solid var(--rule); border-radius: 2px; display: flex; align-items: center; justify-content: center; font-family: 'Inconsolata', monospace; font-size: 10px; color: var(--ink4); background: var(--paper); }
.cal-cell.pct-100 { background: var(--ink2); color: var(--paper); border-color: var(--ink2); }
.cal-cell.pct-75  { background: var(--ink3); color: var(--paper); border-color: var(--ink3); }
.cal-cell.pct-50  { background: var(--paper3); color: var(--ink2); border-color: var(--rule2); }
.cal-cell.pct-25  { background: var(--paper2); color: var(--ink3); border-color: var(--rule); }
.cal-cell.today-cell { border-color: var(--ink); border-width: 1.5px; color: var(--ink); }
.cal-cell.empty { background: transparent; border-color: transparent; }

/* HABIT BARS */
.habit-bar-item { padding: 14px 0; border-bottom: 1px solid var(--rule); }
.habit-bar-item:last-child { border-bottom: none; }
.habit-bar-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
.habit-bar-name { font-family: 'Lora', serif; font-size: 14px; color: var(--ink); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 10px; }
.habit-bar-pct { font-family: 'Inconsolata', monospace; font-size: 12px; color: var(--ink2); flex-shrink: 0; }
.habit-bar-track { height: 1px; background: var(--rule); position: relative; }
.habit-bar-fill { position: absolute; top: 0; left: 0; bottom: 0; background: var(--ink2); transition: width 0.5s ease; }
.habit-streak { font-family: 'Inconsolata', monospace; font-size: 10px; color: var(--ink4); margin-top: 6px; letter-spacing: 0.04em; }

/* EMPTY */
.empty-state { text-align: center; padding: 40px 24px; }
.empty-state-text { font-family: 'Lora', serif; font-size: 14px; font-style: italic; color: var(--ink4); line-height: 1.7; }

::-webkit-scrollbar { display: none; }
</style>
</head>
<body>

<!-- TODAY -->
<div class="view active" id="view-today">
  <div class="header">
    <div class="header-eyebrow" id="today-date"></div>
    <div class="header-title">Daily Routine</div>
    <div class="progress-row">
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <div class="progress-label" id="progress-label">0 / 0</div>
    </div>
  </div>

  <div class="scroll-content">
    <div class="reset-row">
      <button class="reset-btn" onclick="resetToday()">Reset day</button>
    </div>

    <div class="section-head">
      <div class="section-name morning">Morning</div>
      <div class="section-time">5:00 – 8:00 am</div>
    </div>
    <div class="section-rule"></div>
    <div id="habits-morning"></div>

    <div class="section-head">
      <div class="section-name midday">Midday</div>
      <div class="section-time">12:00 pm</div>
    </div>
    <div class="section-rule"></div>
    <div id="habits-midday"></div>

    <div class="section-head">
      <div class="section-name evening">Evening</div>
      <div class="section-time">7:00 – 9:00 pm</div>
    </div>
    <div class="section-rule"></div>
    <div id="habits-evening"></div>

    <div class="complete-msg" id="complete-msg">
      <div class="complete-title">Routine complete.</div>
      <div class="complete-sub">Every habit checked for today.</div>
    </div>
    <div style="height:20px"></div>
  </div>
</div>

<!-- TRENDS -->
<div class="view" id="view-trends">
  <div class="trends-header">
    <div class="trends-eyebrow">History</div>
    <div class="trends-title">Trends</div>
  </div>

  <div class="trends-scroll">
    <div class="period-tabs">
      <button class="period-tab active" onclick="setPeriod(7,this)">7 days</button>
      <button class="period-tab" onclick="setPeriod(14,this)">14 days</button>
      <button class="period-tab" onclick="setPeriod(30,this)">30 days</button>
    </div>

    <div class="stat-grid">
      <div class="stat-card"><div class="stat-val" id="stat-streak">—</div><div class="stat-label">Day streak</div></div>
      <div class="stat-card"><div class="stat-val" id="stat-avg">—</div><div class="stat-label">Avg complete</div></div>
      <div class="stat-card"><div class="stat-val" id="stat-best">—</div><div class="stat-label">Best day</div></div>
      <div class="stat-card"><div class="stat-val" id="stat-days">—</div><div class="stat-label">Days tracked</div></div>
    </div>

    <div class="trend-section">
      <div class="trend-section-title">This week</div>
      <div class="week-row" id="week-heatmap"></div>
      <div class="legend-row">
        <div class="legend-item"><div class="legend-swatch" style="background:var(--ink2);border-color:var(--ink2)"></div>100%</div>
        <div class="legend-item"><div class="legend-swatch" style="background:var(--ink3);border-color:var(--ink3)"></div>75%+</div>
        <div class="legend-item"><div class="legend-swatch" style="background:var(--paper3)"></div>50%+</div>
        <div class="legend-item"><div class="legend-swatch" style="background:var(--paper2)"></div>&lt;50%</div>
      </div>
    </div>

    <div class="trend-section">
      <div class="trend-section-title">30-day calendar</div>
      <div class="cal-header-row">
        <div class="cal-header-cell">Su</div><div class="cal-header-cell">Mo</div>
        <div class="cal-header-cell">Tu</div><div class="cal-header-cell">We</div>
        <div class="cal-header-cell">Th</div><div class="cal-header-cell">Fr</div>
        <div class="cal-header-cell">Sa</div>
      </div>
      <div class="calendar-grid" id="cal-grid"></div>
    </div>

    <div class="trend-section">
      <div class="trend-section-title">By habit</div>
      <div id="habit-bars"></div>
    </div>

    <div style="height:20px"></div>
  </div>
</div>

<!-- NAV -->
<nav class="nav">
  <button class="nav-btn active" id="nav-today" onclick="switchView('today')">
    <svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><polyline points="9 16 11 18 15 14"/></svg>
    Today
  </button>
  <button class="nav-btn" id="nav-trends" onclick="switchView('trends')">
    <svg class="nav-icon" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Trends
  </button>
</nav>

<script>
const HABITS = {
  morning: [
    { id:'wake-weigh',   title:'Wake & weigh in',             sub:'Wyze scale \u2192 Apple Health (weight, body comp, body fat %)' },
    { id:'temp',         title:'Body temperature',             sub:'Kinsa thermometer \u2192 Apple Health' },
    { id:'sad-lamp',     title:'SAD lamp \u2014 100,000 lux', sub:'Run during morning routine. Circadian anchoring, melatonin suppression.', isNew:true },
    { id:'am-supps',     title:'Morning supplements',          sub:'Adderall XR \u00b7 Cetirizine \u00b7 Omega-3s \u00b7 D3/K2 \u00b7 Phosphatidylserine' },
    { id:'brush-am',     title:'Brush teeth \u2014 2 min',    sub:'Mova \u00b7 Sensodyne Pronamel Gentle Whitening' },
    { id:'shower',       title:'Shower',                       sub:"Pura D'Or shampoo \u00b7 Aveeno body wash \u00b7 Cetaphil face wash \u00b7 Silicone scrub brush" },
    { id:'hair-shave',   title:'Hair & shaving',               sub:"Honest Co. detangler \u2192 blow dry \u00b7 Shave every ~3 days" },
    { id:'face-mask',    title:'Therabody Face Glo mask',      sub:'Full red + infrared + blue light cycle' },
    { id:'moisturize',   title:'Moisturize',                   sub:'Eucerin Eczema Relief \u00b7 Outdoors: CeraVe AM SPF 30' },
    { id:'coffee',       title:'Coffee',                       sub:'Black, latte, or cortado \u00b7 Delay 30\u201360 min after Adderall', note:'Stagger from Adderall to smooth dopamine peak' },
    { id:'coq10',        title:'CoQ10 200mg with breakfast',   sub:'Sports Research \u00b7 Take with eggs + butter for fat absorption', isNew:true },
    { id:'breakfast',    title:'Breakfast',                    sub:'3 scrambled eggs in grass-fed butter (primary)' },
    { id:'shake',        title:'Protein shake',                sub:'5g Creatine \u00b7 32g Protein (24g Whey + 7g PB Powder)', note:'Habit in progress \u2014 anchor this daily' },
  ],
  midday: [
    { id:'lunch',        title:'Lunch \u2014 packed from home', sub:'' },
    { id:'multi',        title:'Multivitamin',                  sub:'Taken with lunch to avoid nausea' },
    { id:'creatine-mid', title:'Creatine 5g (if shake skipped)', sub:'Fallback for consistent dosing', isNew:true },
    { id:'brush-mid',    title:'Brush teeth after lunch',        sub:'Sonicare \u00b7 Sensodyne Pronamel' },
  ],
  evening: [
    { id:'red-filter',   title:'Red filter on phone',           sub:'Enable at sunset \u2014 allows melatonin onset' },
    { id:'stop-fluids',  title:'Stop fluids \u2014 7:00 pm',   sub:'Reduces nighttime waking' },
    { id:'pm-shower',    title:'Short shower \u2014 8:00 pm',  sub:'Water only + Cetaphil face wash \u00b7 Thermogenic sleep signal' },
    { id:'pm-moist',     title:'PM moisturizer',                sub:'Up & Up PM Facial Moisturizing Lotion' },
    { id:'brush-pm',     title:'Brush teeth \u2014 2 min',     sub:'Mova \u00b7 Sensodyne Pronamel' },
    { id:'magnesium',    title:'Magnesium Glycinate 240mg',     sub:"Nature's Bounty \u00b7 30\u201360 min before sleep", isNew:true, note:'Improves REM and sleep onset.' },
    { id:'journal',      title:'5-min journal',                 sub:'Unresolved thoughts + tomorrow\'s priorities. Paper preferred.', isNew:true },
    { id:'kindle',       title:'Read on Kindle',                sub:'Blue light filter max \u00b7 Backlight lowest readable' },
  ]
};

const ALL=[...HABITS.morning.map(h=>({...h,section:'morning'})),...HABITS.midday.map(h=>({...h,section:'midday'})),...HABITS.evening.map(h=>({...h,section:'evening'}))];
const TOTAL=ALL.length;

function dateKey(d){return(d||new Date()).toISOString().slice(0,10);}
function loadDay(k){try{return JSON.parse(localStorage.getItem('r_'+k)||'{}');}catch{return {};}}
function saveDay(k,v){localStorage.setItem('r_'+k,JSON.stringify(v));}
function allDays(){const o={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k.startsWith('r_')){try{o[k.slice(2)]=JSON.parse(localStorage.getItem(k));}catch{}}}return o;}

const TODAY=dateKey();
let todayData=loadDay(TODAY);

function renderSection(s){
  const c=document.getElementById('habits-'+s);
  c.innerHTML='';
  HABITS[s].forEach(h=>{
    const done=!!todayData[h.id];
    const el=document.createElement('div');
    el.className='habit'+(done?' done':'');
    el.innerHTML=`<div class="check-box"><svg class="check-icon" width="10" height="10" viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 4,7.5 8.5,2.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="habit-body"><div class="habit-title">${h.title}${h.isNew?'<span class="new-mark">new</span>':''}</div>${h.sub?`<div class="habit-sub">${h.sub}</div>`:''}${h.note?`<div class="habit-note">${h.note}</div>`:''}</div>`;
    el.addEventListener('click',()=>toggle(h.id,s));
    c.appendChild(el);
  });
}

function toggle(id,s){todayData[id]=!todayData[id];saveDay(TODAY,todayData);renderSection(s);updateProgress();}

function updateProgress(){
  const done=ALL.filter(h=>todayData[h.id]).length;
  const pct=Math.round(done/TOTAL*100);
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-label').textContent=done+' / '+TOTAL;
  document.getElementById('complete-msg').classList.toggle('show',done===TOTAL);
}

function resetToday(){if(!confirm('Reset all habits for today?'))return;todayData={};saveDay(TODAY,todayData);['morning','midday','evening'].forEach(renderSection);updateProgress();}

function setDate(){const d=new Date();document.getElementById('today-date').textContent=d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}).toUpperCase();}

let period=7;
function setPeriod(n,btn){period=n;document.querySelectorAll('.period-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderTrends();}
function pastDates(n){return Array.from({length:n},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(n-1-i));return dateKey(d);});}
function pctCls(p){if(p>=1)return'pct-100';if(p>=0.75)return'pct-75';if(p>=0.5)return'pct-50';if(p>0)return'pct-25';return'';}

function calcStreak(days){let s=0,d=new Date();while(true){const k=dateKey(d);const data=days[k]||{};const done=ALL.filter(h=>data[h.id]).length;if(done>0)s++;else break;d.setDate(d.getDate()-1);if(s>999)break;}return s;}

function renderTrends(){
  const days=allDays();const dates=pastDates(period);
  const tracked=dates.filter(d=>days[d]&&Object.keys(days[d]).length>0);
  const str=calcStreak(days);
  const avg=tracked.length>0?Math.round(tracked.reduce((s,d)=>s+ALL.filter(h=>days[d][h.id]).length/TOTAL,0)/tracked.length*100):0;
  const best=dates.length>0?Math.round(Math.max(...dates.map(d=>days[d]?ALL.filter(h=>days[d][h.id]).length/TOTAL:0))*100):0;
  document.getElementById('stat-streak').textContent=str;
  document.getElementById('stat-avg').textContent=avg+'%';
  document.getElementById('stat-best').textContent=best+'%';
  document.getElementById('stat-days').textContent=tracked.length;

  const WD=['Su','Mo','Tu','We','Th','Fr','Sa'];
  const wc=document.getElementById('week-heatmap');wc.innerHTML='';
  pastDates(7).forEach(ds=>{
    const d=new Date(ds+'T12:00:00');const day=days[ds]||{};
    const p=ALL.filter(h=>day[h.id]).length/TOTAL;
    const isToday=ds===TODAY,isFuture=ds>TODAY;
    const cls=['week-day-cell',pctCls(p),isToday?'is-today':'',isFuture?'future':''].filter(Boolean).join(' ');
    const lbl=p>0?Math.round(p*100)+'%':(isToday?'\u00b7':'');
    wc.innerHTML+=`<div class="week-day"><div class="week-day-label">${WD[d.getDay()]}</div><div class="${cls}">${lbl}</div></div>`;
  });

  const cg=document.getElementById('cal-grid');cg.innerHTML='';
  const cal=pastDates(30);const firstDow=new Date(cal[0]+'T12:00:00').getDay();
  for(let i=0;i<firstDow;i++)cg.innerHTML+=`<div class="cal-cell empty"></div>`;
  cal.forEach(ds=>{
    const d=new Date(ds+'T12:00:00');const day=days[ds]||{};
    const p=ALL.filter(h=>day[h.id]).length/TOTAL;
    const cls=['cal-cell',pctCls(p),ds===TODAY?'today-cell':''].filter(Boolean).join(' ');
    cg.innerHTML+=`<div class="${cls}">${d.getDate()}</div>`;
  });

  const bc=document.getElementById('habit-bars');
  if(tracked.length===0){bc.innerHTML=`<div class="empty-state"><div class="empty-state-text">No data yet.<br>Complete habits today and<br>return to see your trends.</div></div>`;return;}
  const stats=ALL.map(h=>{
    const comps=dates.filter(d=>days[d]&&days[d][h.id]).length;
    const p=tracked.length>0?comps/tracked.length:0;
    let hs=0,dd=new Date();
    while(true){const k=dateKey(dd);if(days[k]&&days[k][h.id])hs++;else break;dd.setDate(dd.getDate()-1);if(hs>365)break;}
    return{...h,p,hs,comps,tr:tracked.length};
  }).sort((a,b)=>b.p-a.p);
  bc.innerHTML=stats.map(h=>`<div class="habit-bar-item"><div class="habit-bar-top"><div class="habit-bar-name">${h.title}</div><div class="habit-bar-pct">${Math.round(h.p*100)}%</div></div><div class="habit-bar-track"><div class="habit-bar-fill" style="width:${Math.round(h.p*100)}%"></div></div><div class="habit-streak">${h.hs>1?h.hs+'-day streak':h.comps+' of '+h.tr+' days'}</div></div>`).join('');
}

function switchView(name){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));document.getElementById('view-'+name).classList.add('active');document.getElementById('nav-'+name).classList.add('active');if(name==='trends')renderTrends();}

setDate();
['morning','midday','evening'].forEach(renderSection);
updateProgress();
</script>

const lk=document.createElement('link');lk.rel='manifest';lk.href=URL.createObjectURL(bl);
document.head.appendChild(lk);
